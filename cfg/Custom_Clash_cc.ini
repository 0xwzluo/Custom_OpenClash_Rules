;Custom_OpenClash_Rules
;全分组防 DNS 泄漏订阅转换模板
;作者：https://github.com/Aethersailor
;项目地址：https://github.com/Aethersailor/Custom_OpenClash_Rules
;基于 ACL4SSR 模板魔改而来，感谢原作者！
;<必须>搭配本项目配套教程，实现最佳化的 OpenClash 使用效果！
;教程：https://github.com/Aethersailor/Custom_OpenClash_Rules/wiki/OpenClash-%E8%AE%BE%E7%BD%AE%E6%96%B9%E6%A1%88
;有问题可提 issue，或者加入本项目 Telegram 群组进行讨论
;Telegram 群组：https://t.me/custom_openclash_rules_group
;Telegram 通知频道：https://t.me/custom_openclash_rules
;建议加入通知频道或群组，谨防失联

[custom]
;设置规则标志位
;以下规则，按照从上往下的顺序遍历，优先命中上位规则，规则重复无影响
;修改顺序会影响分流效果

;本地地址和域名直连
ruleset=🎯 全球直连,[]GEOSITE,private
ruleset=🎯 全球直连,[]GEOIP,private,no-resolve
;本项目收录的直连规则
ruleset=🎯 全球直连,clash-domain:https://gh-proxy.com/https://github.com/0xwzluo/Custom_OpenClash_Rules/blob/main/rule/Custom_Direct_Domain.yaml,28800
ruleset=🎯 全球直连,clash-classic:https://gh-proxy.com/https://github.com/0xwzluo/Custom_OpenClash_Rules/blob/main/rule/Custom_Direct_Classical_IP.yaml,28800
ruleset=🎯 全球直连,clash-classic:https://gh-proxy.com/https://github.com/ACL4SSR/ACL4SSR/blob/master/Clash/Providers/UnBan.yaml
;广告拦截
ruleset=🛑 广告拦截,clash-classic:https://gh-proxy.com/https://github.com/ACL4SSR/ACL4SSR/blob/master/Clash/Providers/BanAD.yaml
ruleset=🍃 应用净化,clash-classic:https://gh-proxy.com/https://github.com/ACL4SSR/ACL4SSR/blob/master/Clash/Providers/Ruleset/Adobe.yaml
ruleset=🍃 应用净化,clash-classic:https://gh-proxy.com/https://github.com/ACL4SSR/ACL4SSR/blob/master/Clash/Providers/BanProgramAD.yaml
;本项目收录的代理规则
ruleset=🚀 节点选择,clash-domain:https://gh-proxy.com/https://github.com/0xwzluo/Custom_OpenClash_Rules/blob/main/rule/Custom_Proxy_Domain.yaml,28800
ruleset=🚀 节点选择,clash-classic:https://gh-proxy.com/https://github.com/0xwzluo/Custom_OpenClash_Rules/blob/main/rule/Custom_Proxy_Classical_IP.yaml,28800
;谷歌在国内可用的域名直连
ruleset=🎯 全球直连,[]GEOSITE,google-cn
;国内游戏域名直连
ruleset=🎯 全球直连,[]GEOSITE,category-games@cn
;Steam 下载 CDN 直连
ruleset=🎯 全球直连,clash-classic:https://gh-proxy.com/https://github.com/0xwzluo/Custom_OpenClash_Rules/blob/main/rule/Steam_CDN_Classical.yaml,28800
;各大游戏平台下载域名直连
ruleset=🎯 全球直连,[]GEOSITE,category-game-platforms-download
;BT Tracker 相关域名直连
ruleset=🎯 全球直连,[]GEOSITE,category-public-tracker
;cloudflare官网
ruleset=☁️ CloudFlareWebsite,GEOSITE,cloudflare
;即时通讯包括了 Telegram/WhatsApp/Line 等海外主流即时通讯软件域名
ruleset=💬 即时通讯,[]GEOSITE,category-communication
;社交媒体包括了 Twitter(X)/Facebook/Instagram 等海外主流社交媒体
ruleset=🌐 社交媒体,[]GEOSITE,category-social-media-!cn
;ruleset=🤖 ChatGPT,[]GEOSITE,openai
ruleset=🤖 AI服务,[]GEOSITE,category-ai-!cn
ruleset=🐳 Docker镜像,GEOSITE,docker
;包括npmjs、github-copilot、github
ruleset=💻 GitHub,[]GEOSITE,github
ruleset=📢 谷歌FCM,[]GEOSITE,googlefcm
ruleset=Ⓖ 谷歌服务,[]GEOSITE,google
;测速工具包括 SpeedTest 等主流测速工具域名
ruleset=🛜 节点测速,[]GEOSITE,category-speedtest
ruleset=🎮 游戏平台,[]GEOSITE,category-games
ruleset=📹 油管视频,[]GEOSITE,youtube
ruleset=🍎 苹果服务,[]GEOSITE,apple
ruleset=Ⓜ️ 微软服务,[]GEOSITE,microsoft
ruleset=🎵 TikTok,[]GEOSITE,tiktok
ruleset=🎥 奈飞视频,[]GEOSITE,netflix
;ruleset=🎥 奈飞视频,[]GEOSITE,disney
;ruleset=🎥 奈飞视频,[]GEOSITE,hbo
;ruleset=🎥 奈飞视频,[]GEOSITE,primevideo
;Emby 包括主流 Emby 服务相关域名
ruleset=🎥 Emby,[]GEOSITE,category-emby
ruleset=🎻 Spotify,[]GEOSITE,spotify
ruleset=📺 Bahamut,[]GEOSITE,bahamut
ruleset=🌎 国外媒体,[]GEOSITE,category-entertainment
ruleset=🛒 国外电商,[]GEOSITE,category-ecommerce
ruleset=🚀 节点选择,[]GEOSITE,gfw
ruleset=💬 即时通讯,[]GEOIP,telegram,no-resolve
ruleset=🌐 社交媒体,[]GEOIP,twitter,no-resolve
ruleset=🌐 社交媒体,[]GEOIP,facebook,no-resolve
ruleset=Ⓖ 谷歌服务,[]GEOIP,google,no-resolve
;cloudflare托管网站
ruleset=☁️ CloudFlareCDN,[]GEOIP,cloudflare
ruleset=🎥 奈飞视频,[]GEOIP,netflix,no-resolve
;由于 OpenClash 使用的大陆白名单收录不全，此处留有 geosite:cn 作为国内域名兜底
ruleset=🎯 全球直连,[]GEOSITE,cn
;由于 OpenClash 使用的大陆白名单收录不全，此处留有 geoip:cn 作为国内 IP 兜底
ruleset=🎯 全球直连,[]GEOIP,cn,no-resolve
;以上兜底规则会根据实际情况随时取消
;PT/BT 优化开启会使 80/443 以外端口的流量直连
ruleset=🔀 非标端口,clash-classic:https://gh-proxy.com/https://github.com/0xwzluo/Custom_OpenClash_Rules/blob/main/rule/Custom_Port_Direct.yaml,28800
;国内冷门域名会命中漏网之鱼，如影响使用，请设置漏网之鱼直连
;漏网之鱼直连时，无法通过 DNS 泄露测试，但是并不存在泄露
ruleset=🐟 漏网之鱼,[]FINAL
;设置规则标志位结束

